worker_processes auto;
worker_cpu_affinity auto;
worker_rlimit_nofile 65535;
error_log logs/error.log warn;
pid       logs/nginx.pid;

events {
    worker_connections 10240;
    multi_accept on;
    use epoll;
}

http {
    include      mime.types;
    default_type application/json;

    access_log logs/access.log combined buffer=512k flush=5s;

    lua_package_path  "$prefix/lua/?.lua;;";
    lua_package_cpath "$prefix/lua/?.so;;";

    lua_shared_dict route_store      1m;
    lua_shared_dict rate_limit_store 10m;
    lua_shared_dict jwt_blacklist     5m;
    lua_shared_dict rr_store          1m;

    lua_socket_pool_size         64;
    lua_socket_keepalive_timeout 60s;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 10000;

    # init_by_lua  → master process, KHÔNG có cosocket → chỉ validate config
    # init_worker  → mỗi worker,    CÓ cosocket    → query DB được
    init_by_lua_file        lua/init.lua;
    init_worker_by_lua_file lua/init_worker.lua;

    resolver 127.0.0.11 ipv6=off;

    server {
        listen 8080 reuseport;
        server_name api-gateway;
        server_tokens off;

        location = /health {
            access_log off;
            content_by_lua_block {
                ngx.header["Content-Type"] = "application/json"
                ngx.print('{"status":"UP","service":"api-gateway"}')
            }
        }

        location /admin/ {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny  all;
            content_by_lua_file lua/admin/handler.lua;
        }

        location /api/ {
            content_by_lua_file lua/router.lua;
        }

        location /who-am-i/ {
            content_by_lua_file lua/router.lua;
        }

        location / {
            content_by_lua_block {
                ngx.status = 404
                ngx.header["Content-Type"] = "application/json"
                ngx.print('{"error":"Not Found","path":"' .. ngx.var.uri .. '"}')
            }
        }

        error_page 500 502 503 504 @gateway_error;
        location @gateway_error {
            content_by_lua_block {
                ngx.header["Content-Type"] = "application/json"
                ngx.print('{"error":"Gateway Error","status":' .. ngx.status .. '}')
            }
        }
    }
}
