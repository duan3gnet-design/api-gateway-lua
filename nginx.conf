worker_processes auto;          # = số CPU core
worker_cpu_affinity auto;       # pin mỗi worker vào 1 core, giảm context switch

# Tăng file descriptor limit (cần set ulimit trên host cũng)
worker_rlimit_nofile 65535;

error_log logs/error.log warn;
pid       logs/nginx.pid;

events {
    worker_connections 10240;   # mỗi worker xử lý tối đa 10k connections
    multi_accept on;            # accept tất cả connections pending trong 1 lần
    use epoll;                  # Linux epoll – I/O event tốt nhất trên Linux
}

http {
    include      mime.types;
    default_type application/json;

    # ── Logging – tắt access log hoặc dùng buffer để giảm I/O ──────────────
    # Buffered logging: ghi theo batch 512k hoặc mỗi 5s – giảm đáng kể disk I/O
    access_log logs/access.log combined buffer=512k flush=5s;
    # Nếu muốn tối đa throughput, tắt hẳn:
    # access_log off;

    # Init: load config, validate – chạy 1 lần per worker
    init_by_lua_file lua/init.lua;

    # ── Lua ────────────────────────────────────────────────────────────────
    lua_package_path  "$prefix/lua/?.lua;;";
    lua_package_cpath "$prefix/lua/?.so;;";

    # Shared memory
    lua_shared_dict rate_limit_store 10m;
    lua_shared_dict jwt_blacklist     5m;

    # Socket pool cho cosocket (http client nếu dùng)
    lua_socket_pool_size 64;
    lua_socket_keepalive_timeout 60s;

    # ── TCP tuning ─────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;         # gom packets trước khi gửi
    tcp_nodelay     on;         # sau keepalive, gửi ngay không delay

    # ── Keepalive ─────────────────────────────────────────────────────────
    keepalive_timeout      65;
    keepalive_requests     10000;   # số request tối đa trên 1 keepalive conn

    # ── Timeouts ──────────────────────────────────────────────────────────
    client_header_timeout  10s;
    client_body_timeout    10s;
    send_timeout           10s;

    # ── Buffer tuning ─────────────────────────────────────────────────────
    client_header_buffer_size    2k;
    large_client_header_buffers  4 8k;
    client_body_buffer_size      16k;
    client_max_body_size         1m;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip            on;
    gzip_min_length 1000;       # chỉ nén response >= 1KB
    gzip_types      application/json text/plain;
    gzip_proxied    any;

    # ── Upstream: auth-service ────────────────────────────────────────────
    # upstream auth_service {
    #     server host.docker.internal:8081;
    #     # Keepalive pool: tái dùng connection tới upstream
    #     keepalive 64;
    #     keepalive_requests 10000;
    #     keepalive_timeout  60s;
    # }

    # # ── Upstream: resource-service ────────────────────────────────────────
    # upstream resource_service {
    #     server host.docker.internal:8082;
    #     keepalive 64;
    #     keepalive_requests 10000;
    #     keepalive_timeout  60s;
    # }

    upstream who-am-i {
        server who-am-i:80;
        keepalive 64;
        keepalive_requests 10000;
    }

    # ── Gateway server ────────────────────────────────────────────────────
    server {
        listen 8080 reuseport;  # reuseport: kernel phân phối connections tới workers, giảm lock
        server_name api-gateway;

        # Tắt server tokens
        server_tokens off;

        # ── Health check ────────────────────────────────────────────────
        location = /health {
            access_log off;
            content_by_lua_block {
                ngx.header["Content-Type"] = "application/json"
                ngx.print('{"status":"UP"}')
            }
        }

        # ── Auth service (public) ────────────────────────────────────────
        # location /api/auth/ {
        #     access_by_lua_file lua/middleware/rate_limiter.lua;

        #     proxy_pass          http://auth_service;
        #     proxy_http_version  1.1;                    # bắt buộc cho keepalive
        #     proxy_set_header    Connection "";           # bắt buộc cho keepalive
        #     include             conf/conf/proxy_headers.conf;

        #     # Upstream timeouts
        #     proxy_connect_timeout 3s;
        #     proxy_send_timeout    10s;
        #     proxy_read_timeout    30s;

        #     # Buffer upstream response trong memory, không ghi disk
        #     proxy_buffering         on;
        #     proxy_buffer_size       8k;
        #     proxy_buffers           8 16k;
        # }

        # # ── Resource service (protected) ─────────────────────────────────
        # location /api/resource/ {
        #     access_by_lua_file lua/middleware/auth.lua;
        #     access_by_lua_file lua/middleware/rbac.lua;
        #     access_by_lua_file lua/middleware/rate_limiter.lua;

        #     proxy_pass          http://resource_service;
        #     proxy_http_version  1.1;
        #     proxy_set_header    Connection "";
        #     include             conf/conf/proxy_headers.conf;

        #     proxy_set_header    X-User-Id    $http_x_user_id;
        #     proxy_set_header    X-User-Roles $http_x_user_roles;

        #     proxy_connect_timeout 3s;
        #     proxy_send_timeout    10s;
        #     proxy_read_timeout    30s;

        #     proxy_buffering         on;
        #     proxy_buffer_size       8k;
        #     proxy_buffers           8 16k;

        #     header_filter_by_lua_file lua/middleware/response_header.lua;
        # }

        location /who-am-i/ {
            access_by_lua_file lua/middleware/filters.lua;
            proxy_pass         http://who-am-i;
            include            conf/proxy_headers.conf;
        }

        # ── Admin ────────────────────────────────────────────────────────
        location /admin/ {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny  all;
            content_by_lua_file lua/admin/handler.lua;
        }

        # ── 404 ──────────────────────────────────────────────────────────
        location / {
            content_by_lua_block {
                ngx.status = 404
                ngx.header["Content-Type"] = "application/json"
                ngx.print('{"error":"Not Found"}')
            }
        }

        error_page 500 502 503 504 @gateway_error;
        location @gateway_error {
            content_by_lua_block {
                ngx.header["Content-Type"] = "application/json"
                ngx.print('{"error":"Gateway Error","status":' .. ngx.status .. '}')
            }
        }
    }
}
